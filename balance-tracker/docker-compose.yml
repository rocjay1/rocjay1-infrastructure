services:
  frontend:
    image: ghcr.io/rocjay1/balance-tracker-frontend:latest
    container_name: balance-tracker-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api
    networks:
      - tunnel-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  backend:
    image: ghcr.io/rocjay1/balance-tracker-backend:latest
    container_name: balance-tracker-backend
    restart: unless-stopped
    environment:
      - DB_PATH=/data/finance.db
    volumes:
      - backend-data:/data
      - ./config/config.yaml:/app/config.yaml:ro
    networks:
      - tunnel-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: balance-tracker-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - tunnel-net

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-config.json:/config.json:ro
    command: --interval 300 --cleanup --label-enable
    environment:
      - WATCHTOWER_POLL_INTERVAL=300

networks:
  tunnel-net:
    driver: bridge

volumes:
  backend-data:
