services:
  frontend:
    image: ghcr.io/rocjay1/balance-tracker-frontend:latest
    container_name: balance-tracker-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api
    networks:
      - tunnel-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  backend:
    image: ghcr.io/rocjay1/balance-tracker-backend:latest
    container_name: balance-tracker-backend
    restart: unless-stopped
    environment:
      - DB_PATH=/data/finance.db
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/data
      - ./config/config.yaml:/app/config.yaml:ro
    networks:
      - tunnel-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: balance-tracker-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - tunnel-net

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-config.json:/config.json:ro
    command: --interval 300 --cleanup --label-enable
    environment:
      - WATCHTOWER_POLL_INTERVAL=300

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    networks:
      - tunnel-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - tunnel-net

networks:
  tunnel-net:
    driver: bridge

volumes:
  backend-data:
  prometheus-data:
  grafana-data:
