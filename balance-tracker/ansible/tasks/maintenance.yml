---
# System Monitoring and Cron Maintenance

- name: Install Node Exporter for metrics
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: present

- name: Start and enable Node Exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: started
    enabled: yes


- name: Set up weekly Docker system prune
  ansible.builtin.cron:
    name: "Docker Weekly System Prune"
    minute: "0"
    hour: "3"
    weekday: "0" # Sunday at 3:00 AM
    job: "docker system prune -af --volumes >> /var/log/docker-prune.log 2>&1"
    user: root

- name: Check if a reboot is required due to updates
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: Reboot the server if required
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible for kernel updates"
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: whoami
  when: reboot_required_file.stat.exists
