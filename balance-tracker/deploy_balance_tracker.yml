---
- name: Deploy Balance Tracker
  hosts: balance_tracker_vm
  become: yes
  vars_files:
    - vars/vault.yml

  vars:
    project_root: "/opt/balance-tracker"
    # Use vault variable if it exists, otherwise fallback to env
    tunnel_token: "{{ vault_tunnel_token | default(lookup('env', 'TUNNEL_TOKEN'), true) | default('your_token_here', true) }}"

  tasks:
    - name: Ensure project directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      loop:
        - "{{ project_root }}"
        - "{{ project_root }}/config"

    - name: Copy Docker Compose file
      ansible.builtin.copy:
        src: "./docker-compose.yml"
        dest: "{{ project_root }}/docker-compose.yml"
        mode: '0644'

    - name: Create .env file with Tunnel Token
      ansible.builtin.copy:
        dest: "{{ project_root }}/.env"
        content: "TUNNEL_TOKEN={{ tunnel_token }}"
        mode: '0600'

    - name: Template application configuration
      ansible.builtin.template:
        src: "./templates/config.yaml.j2"
        dest: "{{ project_root }}/config/config.yaml"
        mode: '0644'

    - name: Template Prometheus configuration
      ansible.builtin.template:
        src: "./templates/prometheus.yml.j2"
        dest: "{{ project_root }}/prometheus.yml"
        mode: '0644'

    - name: Template Promtail configuration
      ansible.builtin.template:
        src: "./templates/promtail-config.yml.j2"
        dest: "{{ project_root }}/promtail-config.yml"
        mode: '0644'

    - name: Create docker-config.json with GHCR credentials
      ansible.builtin.copy:
        dest: "{{ project_root }}/docker-config.json"
        content: |
          {
            "auths": {
              "ghcr.io": {
                "auth": "{{ vault_ghcr_auth }}"
              }
            }
          }
        mode: '0600'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      when: vault_ghcr_auth is defined

    - name: Ensure unprivileged user has access to docker config
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.docker"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'

    - name: Copy docker config for user pulls
      ansible.builtin.copy:
        src: "{{ project_root }}/docker-config.json"
        dest: "/home/{{ ansible_user }}/.docker/config.json"
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Deploy services via Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ project_root }}"
        pull: always
        state: present
        remove_orphans: yes
      become: no

    - name: Prune old Docker images
      community.docker.docker_prune:
        images: yes
        images_filters:
          dangling: false
      become: no

    - name: Include Host Security and Hardening Tasks
      ansible.builtin.import_tasks: tasks/security.yml

    - name: Include Docker Engine Lifecycle Tasks
      ansible.builtin.import_tasks: tasks/docker.yml

    - name: Include Data Persistence and Backups Tasks
      ansible.builtin.import_tasks: tasks/backups.yml

    - name: Include System Monitoring and Maintenance Tasks
      ansible.builtin.import_tasks: tasks/maintenance.yml

  handlers:
    - name: Include Handlers
      ansible.builtin.import_tasks: handlers/main.yml
