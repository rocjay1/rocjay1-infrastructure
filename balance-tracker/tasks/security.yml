---
# Host Security and Hardening Tasks

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install Uncomplicated Firewall (UFW)
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set UFW default deny incoming, allow outgoing
  community.general.ufw:
    direction: "{{ item.dir }}"
    policy: "{{ item.pol }}"
  loop:
    - { dir: 'incoming', pol: 'deny' }
    - { dir: 'outgoing', pol: 'allow' }

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Allow Prometheus through UFW
  community.general.ufw:
    rule: allow
    port: '9090'
    proto: tcp

- name: Allow Node Exporter through UFW
  community.general.ufw:
    rule: allow
    port: '9100'
    proto: tcp

- name: Allow Grafana through UFW
  community.general.ufw:
    rule: allow
    port: '3000'
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
    logging: 'on'
  notify: restart docker

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Configure unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: '0644'

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
  notify: restart ssh

- name: Disable SSH root login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: restart ssh
