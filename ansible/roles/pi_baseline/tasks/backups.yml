---
# Data Persistence and Backups

- name: Ensure backend data volume host path exists
  ansible.builtin.file:
    path: /var/lib/docker/volumes/balance-tracker_backend-data/_data
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Ensure backup directory exists
  ansible.builtin.file:
    path: /opt/balance-tracker/backups
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Create daily SQLite backup script
  ansible.builtin.copy:
    dest: /opt/balance-tracker/backup-db.sh
    content: |
      #!/bin/bash
      TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
      BACKUP_DIR="/opt/balance-tracker/backups"
      DB_FILE="/var/lib/docker/volumes/balance-tracker_backend-data/_data/finance.db"

      # SQLite online backup command (.backup) ensures consistency without locking the DB
      sqlite3 $DB_FILE ".backup '$BACKUP_DIR/finance_$TIMESTAMP.db'"

      # Keep only the last 7 backups
      ls -t $BACKUP_DIR/finance_*.db | tail -n +8 | xargs -r rm --
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Set up cron job for daily database backup
  ansible.builtin.cron:
    name: "Balance Tracker Daily Backup"
    minute: "0"
    hour: "2"
    job: "/opt/balance-tracker/backup-db.sh >> /var/log/balance-tracker-backup.log 2>&1"
    user: root
