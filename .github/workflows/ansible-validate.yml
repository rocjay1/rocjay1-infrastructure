name: Ansible Validate

env:
  PYTHON_VERSION: "3.13"

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ansible:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: miniflux/ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible tooling
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create CI vault password placeholder
        run: printf '%s\n' ci-placeholder > .vault_pass

      - name: Syntax check
        run: ansible-playbook -i hosts.ini deploy_miniflux.yml --syntax-check

      - name: Ansible lint
        run: ansible-lint deploy_miniflux.yml ../../ansible/roles/debian_docker_host
