name: Terraform Drift Detection

env:
  TERRAFORM_VERSION: "1.15.2"

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC
  workflow_dispatch:

concurrency:
  group: drift-detection
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  drift-detection:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - cloudflare/terraform
          - flare-bridge/terraform
          - miniflux/terraform
          - google-cloud/terraform

    defaults:
      run:
        working-directory: ${{ matrix.workspace }}

    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_uptime_check_secret: ${{ secrets.UPTIME_CHECK_SECRET }}
      TF_VAR_apple_domain_verification: ${{ secrets.APPLE_DOMAIN_VERIFICATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          workload_identity_provider: "projects/921000564704/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "terraform-drift-detector@abiding-cycle-464914-p6.iam.gserviceaccount.com"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Drift Detection & Reporting
        id: drift
        run: |
          # 1. Initialize and Plan
          terraform init -input=false
          set +e
          terraform plan -detailed-exitcode -lock=false -input=false -out=tfplan
          exit_code=$?
          set -e

          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT

          # 2. Capture Plan for Jules and Summary
          if [ "$exit_code" -eq "2" ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
            # Capture plan output to a multiline string for Jules using a dynamic EOF
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "plan_output<<$EOF" >> $GITHUB_OUTPUT
            terraform show -no-color tfplan >> $GITHUB_OUTPUT
            echo "$EOF" >> $GITHUB_OUTPUT
            
            # 3. Publish to Job Summary
            echo "### Drift Report for \`${{ matrix.workspace }}\`" >> $GITHUB_STEP_SUMMARY
            echo "#### ⚠️ Drift Detected" >> $GITHUB_STEP_SUMMARY
            echo '```terraform' >> $GITHUB_STEP_SUMMARY
            terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          elif [ "$exit_code" -eq "0" ]; then
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "### Drift Report for \`${{ matrix.workspace }}\`" >> $GITHUB_STEP_SUMMARY
            echo "#### ✅ No Drift Detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "### Drift Report for \`${{ matrix.workspace }}\`" >> $GITHUB_STEP_SUMMARY
            echo "#### ❌ Terraform Plan Failed (Exit Code: $exit_code)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Invoke Jules to fix drift
        if: steps.drift.outputs.drift_detected == 'true'
        uses: google-labs-code/jules-action@bff7875eaa123cac6742b7cfc51005b95ba4d566
        env:
          DRIFT_SUMMARY: ${{ steps.drift.outputs.plan_output }}
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          prompt: |
            Role: You are Jules, an expert Cloud Infrastructure Engineer.
            Task: Terraform drift was detected in the `${{ matrix.workspace }}` workspace. You must update the local Terraform configuration to adopt the drift (matching the current real-world cloud state).

            Drift Details:
            ${{ env.DRIFT_SUMMARY }}

            Execution Steps:
            1. Read the `GEMINI.md` file in the repository root to understand the repository standards.
            2. Analyze the drift summary to identify exactly which resources and attributes have changed.
            3. Locate the corresponding configuration blocks within the `.tf` files inside `${{ matrix.workspace }}`.
            4. Modify the configuration to match the new state. If the drifted value is a secret, DO NOT hardcode it; ensure it is properly routed through a variable or data source.
            5. Run `terraform fmt -recursive` on the `${{ matrix.workspace }}` directory before committing.

            Constraints:
            - Scope: DO NOT modify any files outside of the `${{ matrix.workspace }}` directory.
            - Safety: DO NOT run `terraform apply` or `terraform destroy`.

            Automation Rules:
            - Create a new Pull Request with the fixes.
            - In the PR description, explicitly list which resources were updated to resolve the drift.

      - name: Finalize Status
        if: always()
        run: |
          if [ "${{ steps.drift.outputs.exit_code }}" == "1" ]; then
            echo "::error::Failing job because a Terraform error occurred (Exit Code 1)."
            exit 1
          fi

          if [ "${{ steps.drift.outputs.exit_code }}" == "2" ]; then
            echo "::error::Drift was detected (Exit Code 2). A remediation PR has been triggered via Jules. This pipeline will fail until the drift is resolved."
            exit 1 # Fail the pipeline to ensure visibility
          fi
