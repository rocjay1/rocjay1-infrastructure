name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC
  workflow_dispatch:

concurrency:
  group: drift-detection
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  drift-detection:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - cloudflare/terraform
          - flare-bridge/terraform
          - miniflux/terraform
          - google-cloud/terraform

    defaults:
      run:
        working-directory: ${{ matrix.workspace }}

    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_uptime_check_secret: ${{ secrets.UPTIME_CHECK_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/921000564704/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'terraform-drift-detector@abiding-cycle-464914-p6.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -lock=false -input=false -out=tfplan
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          
          if [ "$exit_code" -eq "2" ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
            terraform show -no-color tfplan > DRIFT_REPORT.md
            exit 1
          elif [ "$exit_code" -ne "0" ]; then
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            exit "$exit_code"
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Publish Drift Report to Job Summary
        if: always()
        run: |
          echo "### Drift Report for \`${{ matrix.workspace }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.plan.outputs.drift_detected }}" == "true" ]; then
            echo "#### ⚠️ Drift Detected" >> $GITHUB_STEP_SUMMARY
            echo '```terraform' >> $GITHUB_STEP_SUMMARY
            cat DRIFT_REPORT.md >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.plan.outputs.exit_code }}" == "0" ]; then
            echo "#### ✅ No Drift Detected" >> $GITHUB_STEP_SUMMARY
          elif [ -z "${{ steps.plan.outputs.exit_code }}" ]; then
            echo "#### ❌ Workflow failed before reaching the plan step." >> $GITHUB_STEP_SUMMARY
          else
            echo "#### ❌ Terraform Plan Failed (Exit Code: ${{ steps.plan.outputs.exit_code }})" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create Pull Request
        if: steps.plan.outputs.drift_detected == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: terraform drift detected in ${{ matrix.workspace }}'
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          branch: drift-detection/${{ matrix.workspace }}
          delete-branch: true
          title: 'Drift Detected: ${{ matrix.workspace }}'
          body: |
            Terraform drift has been detected in the `${{ matrix.workspace }}` workspace.
            
            Please review the attached `DRIFT_REPORT.md` and reconcile the changes.
            
            _This PR was automatically generated by the Terraform Drift Detection workflow._
          labels: drift-detection
          path: ${{ matrix.workspace }}
