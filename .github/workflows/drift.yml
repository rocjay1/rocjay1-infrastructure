name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC
  workflow_dispatch:

concurrency:
  group: drift-detection
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  drift-detection:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - cloudflare/terraform
          - flare-bridge/terraform
          - miniflux/terraform
          - google-cloud/terraform

    defaults:
      run:
        working-directory: ${{ matrix.workspace }}

    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_uptime_check_secret: ${{ secrets.UPTIME_CHECK_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/921000564704/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'terraform-drift-detector@abiding-cycle-464914-p6.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Drift Detection & Reporting
        id: drift
        run: |
          # 1. Initialize and Plan
          terraform init -input=false
          set +e
          terraform plan -detailed-exitcode -lock=false -input=false -out=tfplan
          exit_code=$?
          set -e
          
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          
          # 2. Publish to Job Summary (Immediate Feedback)
          echo "### Drift Report for \`${{ matrix.workspace }}\`" >> $GITHUB_STEP_SUMMARY
          
          if [ "$exit_code" -eq "2" ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
            echo "#### ⚠️ Drift Detected" >> $GITHUB_STEP_SUMMARY
            echo '```terraform' >> $GITHUB_STEP_SUMMARY
            terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            
            # 3. Create Pull Request (In-step logic to ensure context)
            echo "Reconciling drift via Pull Request..."
            terraform show -no-color tfplan > DRIFT_REPORT.md
          elif [ "$exit_code" -eq "0" ]; then
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "#### ✅ No Drift Detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "#### ❌ Terraform Plan Failed (Exit Code: $exit_code)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create Pull Request
        id: cpr
        if: steps.drift.outputs.drift_detected == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: terraform drift detected in ${{ matrix.workspace }}'
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          branch: drift-detection/${{ matrix.workspace }}
          delete-branch: true
          title: 'Drift Detected: ${{ matrix.workspace }}'
          body: |
            Terraform drift has been detected in the `${{ matrix.workspace }}` workspace.
            
            _This PR was automatically generated by the Terraform Drift Detection workflow._
          labels: drift-detection
          add-paths: |
            ${{ matrix.workspace }}/DRIFT_REPORT.md

      - name: Invoke Jules to fix drift
        if: steps.drift.outputs.drift_detected == 'true' && steps.cpr.outputs.pull-request-number != ''
        uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          prompt: |
            Terraform drift was detected in the `${{ matrix.workspace }}` workspace.
            Please investigate the drift reported in `${{ matrix.workspace }}/DRIFT_REPORT.md` and update the Terraform configuration files in `${{ matrix.workspace }}` to match the current cloud state and resolve the drift.
            Apply the fixes directly to the `${{ steps.cpr.outputs.pull-request-branch }}` branch.

      - name: Finalize Status
        if: always()
        run: |
          if [ "${{ steps.drift.outputs.exit_code }}" != "0" ] && [ -n "${{ steps.drift.outputs.exit_code }}" ]; then
            echo "Failing job because Terraform Plan returned exit code ${{ steps.drift.outputs.exit_code }}"
            exit 1
          fi
