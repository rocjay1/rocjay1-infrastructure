---
- name: Deploy Miniflux
  hosts: miniflux_gcp
  become: true

  vars:
    project_root: "/opt/miniflux"
    debian_docker_host_storage_device: "/dev/disk/by-id/google-docker-data"
    debian_docker_host_storage_mount: "/var/lib/docker"
    # Fallback to empty if not provided via extra vars or interactive prompt
    tunnel_token: "{{ vault_tunnel_token | default('set_token_in_vault') }}"
    db_password: "{{ vault_db_password | default('set_db_password_in_vault') }}"
    admin_password: "{{ vault_admin_password | default('set_admin_password_in_vault') }}"

  pre_tasks:
    - name: Check if vault variables file exists
      ansible.builtin.stat:
        path: vars/vault.yml
      register: vault_file

    - name: Load vault variables
      ansible.builtin.include_vars:
        file: vars/vault.yml
      when: vault_file.stat.exists

  roles:
    - role: gcp_host

  tasks:
    - name: Reset SSH connection after baseline user changes
      ansible.builtin.meta: reset_connection

    - name: Ensure project directory exists
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy Docker Compose file
      ansible.builtin.copy:
        src: "./docker-compose.yml"
        dest: "{{ project_root }}/docker-compose.yml"
        mode: '0644'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Create .env file with Tunnel Token and Database Credentials
      ansible.builtin.copy:
        dest: "{{ project_root }}/.env"
        content: |
          TUNNEL_TOKEN={{ tunnel_token }}
          DB_PASSWORD={{ db_password }}
          ADMIN_PASSWORD={{ admin_password }}
        mode: '0600'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Deploy services via Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ project_root }}"
        state: present
        pull: always
      environment:
        PATH: "{{ ansible_env.PATH }}:/usr/local/bin"
